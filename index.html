<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fresh MVP</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 16px;
}
h1 { font-size: 22px; }

button {
  padding: 12px;
  margin: 6px 0;
  border: none;
  border-radius: 10px;
  font-size: 15px;
}
.primary { background: #111; color: white; }

.card {
  background: white;
  padding: 16px;
  border-radius: 14px;
  margin: 14px 0;
}

.status-safe { color: green; }
.status-warning { color: orange; }
.status-urgent { color: red; font-weight: bold; }
.status-expired { color: red; font-weight: bold; }

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.category-buttons button,
.toggle button {
  background: #ddd;
  margin-right: 5px;
}
</style>
</head>

<body>

<h1>🔥 Fresh</h1>

<div class="card">
  <h3>오늘 지킬 수 있는 금액</h3>
  <div id="saveAmount">0원</div>
</div>

<div class="card">
  <h3>재료 등록</h3>

  <input type="file"
         accept="image/*"
         capture="environment"
         id="cameraInput"
         style="display:none;" />

  <button class="primary" onclick="openCamera()">
    📷 유통기한 촬영
  </button>

  <div id="ocrStatus"></div>

  <input type="text" id="productName" placeholder="제품명 입력" />

  <div class="category-buttons">
    <button onclick="setCategory('유제품')">유제품</button>
    <button onclick="setCategory('채소')">채소</button>
    <button onclick="setCategory('육류')">육류</button>
    <button onclick="setCategory('가공식품')">가공식품</button>
    <button onclick="setCategory('과일')">과일</button>
  </div>

  <input type="date" id="expiryDate" />

  <div class="toggle">
    <button onclick="setOpened(false)">📦 개봉 전</button>
    <button onclick="setOpened(true)">🥣 개봉 후</button>
  </div>

  <button class="primary" onclick="saveItem()">저장</button>
</div>

<div class="card">
  <h3>전체 목록</h3>
  <div id="itemList"></div>
</div>

<script>
let selectedCategory = "";
let isOpened = false;

const categoryPrice = {
  "유제품": 3000,
  "채소": 3500,
  "육류": 7000,
  "가공식품": 4000,
  "과일": 5000
};

function openCamera() {
  document.getElementById("cameraInput").click();
}

function setCategory(cat) {
  selectedCategory = cat;
}

function setOpened(val) {
  isOpened = val;
}

document.getElementById("cameraInput").addEventListener("change", async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById("ocrStatus").innerText = "날짜 인식 중...";

  const { data: { text } } = await Tesseract.recognize(file, 'eng');

  const dateMatch = text.match(/\d{2,4}[.\-\/]\d{2}[.\-\/]\d{2}/);

  if (dateMatch) {
    const rawDate = dateMatch[0].replace(/[.\-\/]/g, "-");
    document.getElementById("expiryDate").value = rawDate;
    document.getElementById("ocrStatus").innerText = "날짜 자동 입력 완료";
  } else {
    document.getElementById("ocrStatus").innerText = "날짜를 찾지 못했습니다. 수동 입력해주세요.";
  }
});

function saveItem() {
  const name = document.getElementById("productName").value;
  const expiry = document.getElementById("expiryDate").value;

  if (!name || !expiry || !selectedCategory) {
    alert("필수 항목을 입력하세요.");
    return;
  }

  const items = JSON.parse(localStorage.getItem("freshItems")) || [];

  items.push({
    name,
    category: selectedCategory,
    expiry,
    opened: isOpened,
    price: categoryPrice[selectedCategory]
  });

  localStorage.setItem("freshItems", JSON.stringify(items));

  document.getElementById("productName").value = "";
  document.getElementById("expiryDate").value = "";
  selectedCategory = "";
  isOpened = false;

  renderItems();
}

function getStatus(expiry) {
  const today = new Date();
  const exp = new Date(expiry);
  const diff = Math.ceil((exp - today) / (1000*60*60*24));

  if (diff < 0) return "expired";
  if (diff <= 2) return "urgent";
  if (diff <= 5) return "warning";
  return "safe";
}

function renderItems() {
  const items = JSON.parse(localStorage.getItem("freshItems")) || [];
  const container = document.getElementById("itemList");
  container.innerHTML = "";

  let totalSave = 0;

  items.forEach(item => {
    const status = getStatus(item.expiry);

    if (status === "urgent" && !item.opened) {
      totalSave += item.price;
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${item.name}</strong><br/>
      ${item.category} | ${item.expiry}<br/>
      ${item.opened ? "🥣 개봉 후" : "📦 개봉 전"}<br/>
      <span class="status-${status}">${status}</span>
    `;

    container.appendChild(div);
  });

  document.getElementById("saveAmount").innerText =
    totalSave.toLocaleString() + "원";
}

renderItems();

// PWA Service Worker 등록
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker 등록 완료"));
}
</script>

</body>
</html>
