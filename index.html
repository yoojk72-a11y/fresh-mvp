<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fresh MVP</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0971EW0BKM"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-0971EW0BKM');
</script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 16px;
}

h1 { font-size: 22px; }

.card {
  background: white;
  padding: 16px;
  border-radius: 14px;
  margin: 14px 0;
}

button {
  padding: 12px;
  margin: 6px 0;
  border: none;
  border-radius: 10px;
  font-size: 15px;
}

.primary { background: #111; color: white; }

.category button {
  background: #eee;
  margin: 4px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<h1>🔥 Fresh</h1>

<div class="card">
  <h3>오늘 지킬 수 있는 금액</h3>
  <p id="savingAmount">0원</p>
</div>

<div class="card">
  <h3>재료 등록</h3>

  <button class="primary" onclick="captureDate()">📷 유통기한 촬영</button>
  <p id="ocrMessage"></p>

  <label>유통기한 수동 입력 (yymmdd)</label>
  <input
    type="text"
    id="manualDate"
    placeholder="예: 250731"
    maxlength="6"
    inputmode="numeric"
  >

  <input type="text" id="productName" placeholder="제품명 입력">

  <div class="category">
    <button onclick="setCategory('유제품')">유제품</button>
    <button onclick="setCategory('채소')">채소</button>
    <button onclick="setCategory('육류')">육류</button>
    <button onclick="setCategory('가공식품')">가공식품</button>
    <button onclick="setCategory('과일')">과일</button>
  </div>

  <div>
    <button onclick="setOpenStatus(false)">📦 개봉 전</button>
    <button onclick="setOpenStatus(true)">🥣 개봉 후</button>
  </div>

  <button class="primary" onclick="saveItem()">저장</button>
</div>

<div class="card">
  <h3>등록 목록</h3>
  <ul id="itemList"></ul>
</div>

<script>
let selectedCategory = "";
let isOpened = false;
let ocrDate = "";

// 날짜 정규화 (yy → 20yy)
function normalizeDate(dateStr) {
  let cleaned = dateStr.replace(/[./]/g, "-");
  let parts = cleaned.split("-");

  if (parts[0].length === 2) {
    parts[0] = "20" + parts[0];
  }

  return parts.join("-");
}

// 수동 입력 변환
function convertYYMMDD(input) {
  if (!/^\d{6}$/.test(input)) return null;

  const yy = input.slice(0, 2);
  const mm = input.slice(2, 4);
  const dd = input.slice(4, 6);

  return `20${yy}-${mm}-${dd}`;
}

// OCR 실행
async function captureDate() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.capture = "environment";

  input.onchange = async () => {
    const file = input.files[0];
    const result = await Tesseract.recognize(file, "eng");
    const text = result.data.text;

    const dateMatch = text.match(
      /(\d{4}[-./]\d{2}[-./]\d{2})|(\d{2}[-./]\d{2}[-./]\d{2})/
    );

    if (dateMatch) {
      ocrDate = normalizeDate(dateMatch[0]);
      document.getElementById("ocrMessage").innerText =
        "인식된 날짜: " + ocrDate;

      gtag('event', 'ocr_success');
    } else {
      document.getElementById("ocrMessage").innerText =
        "날짜를 찾지 못했습니다. 수동 입력해주세요.";
    }
  };

  input.click();
}

function setCategory(cat) {
  selectedCategory = cat;
}

function setOpenStatus(status) {
  isOpened = status;
}

function saveItem() {
  const name = document.getElementById("productName").value.trim();
  const manualRaw = document.getElementById("manualDate").value.trim();

  let finalDate = ocrDate;

  if (!finalDate && manualRaw) {
    finalDate = convertYYMMDD(manualRaw);
    gtag('event', 'manual_input_used');
  }

  if (!name || !finalDate) {
    alert("제품명과 유통기한을 입력하세요.");
    return;
  }

  const item = {
    name,
    date: finalDate,
    category: selectedCategory,
    opened: isOpened
  };

  const items = JSON.parse(localStorage.getItem("freshItems") || "[]");
  items.push(item);
  localStorage.setItem("freshItems", JSON.stringify(items));

  gtag('event', 'ingredient_add');

  renderItems();

  // 초기화
  document.getElementById("productName").value = "";
  document.getElementById("manualDate").value = "";
  document.getElementById("ocrMessage").innerText = "";
  ocrDate = "";
}

function renderItems() {
  const items = JSON.parse(localStorage.getItem("freshItems") || "[]");
  const list = document.getElementById("itemList");
  list.innerHTML = "";

  items.forEach(item => {
    const li = document.createElement("li");
    li.innerText = `${item.name} - ${item.date} (${item.category})`;
    list.appendChild(li);
  });
}

renderItems();

// service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
