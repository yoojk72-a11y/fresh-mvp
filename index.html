  <option value="3">3일 전</option>
  <option value="5">5일 전</option>
</select>

  <div class="category">
    <button onclick="setCategory('유제품', this)">유제품</button>
    <button onclick="setCategory('채소', this)">채소</button>
    <button onclick="setCategory('육류', this)">육류</button>
    <button onclick="setCategory('가공식품', this)">가공식품</button>
    <button onclick="setCategory('과일', this)">과일</button>
    <button onclick="setCategory('계란/두부/콩류', this)">계란/두부/콩류</button>
  </div>

  <div class="open-status">
    <button onclick="setOpenStatus(false, this)">📦 개봉 전</button>
    <button onclick="setOpenStatus(true, this)">🥣 개봉 후</button>
  </div>

</div>

<div class="card">
  <h3>전체 목록</h3>
  <ul id="itemList"></ul>
</div>

<script>
let selectedCategory = "";
let isOpened = false;
let ocrDate = "";

// yy → yyyy 변환
function normalizeDate(dateStr) {
  let cleaned = dateStr.replace(/[./]/g, "-");
  let parts = cleaned.split("-");

  if (parts[0].length === 2) {
    parts[0] = "20" + parts[0];
  }

  return parts.join("-");
}

// yymmdd → yyyy-mm-dd
function convertYYMMDD(input) {
  if (!/^\d{6}$/.test(input)) return null;

  const yy = input.slice(0, 2);
  const mm = input.slice(2, 4);
  const dd = input.slice(4, 6);

  return `20${yy}-${mm}-${dd}`;
}

async function captureDate() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.capture = "environment";

  input.onchange = async () => {
    const file = input.files[0];
    const result = await Tesseract.recognize(file, "eng");
    const text = result.data.text;

    const dateMatch = text.match(
      /(\d{4}[-./]\d{2}[-./]\d{2})|(\d{2}[-./]\d{2}[-./]\d{2})/
    );

    if (dateMatch) {
      ocrDate = normalizeDate(dateMatch[0]);
      document.getElementById("ocrMessage").innerText =
        "인식된 날짜: " + ocrDate;
    } else {
      document.getElementById("ocrMessage").innerText =
        "날짜를 찾지 못했습니다. 직접 입력해주세요.";
    }
  };

  input.click();
}

function setCategory(cat, el) {
  selectedCategory = cat;
  document.querySelectorAll(".category button")
    .forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");
}

function setOpenStatus(status, el) {
  isOpened = status;
  document.querySelectorAll(".open-status button")
    .forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");
}

function saveItem() {
  const name = document.getElementById("productName").value.trim();
  const textInput = document.getElementById("manualDateText").value.trim();
  const pickerInput = document.getElementById("manualDatePicker").value;

  let finalDate = ocrDate;

  if (!finalDate && textInput) {
    finalDate = convertYYMMDD(textInput);
  }

  if (!finalDate && pickerInput) {
    finalDate = pickerInput;
  }

  if (!name || !finalDate) {
    alert("제품명과 유통기한을 입력하세요.");
    return;
  }

  const item = {
    name,
    date: finalDate,
    category: selectedCategory,
    opened: isOpened
  };

  const items = JSON.parse(localStorage.getItem("freshItems") || "[]");
  items.push(item);
  localStorage.setItem("freshItems", JSON.stringify(items));

  renderItems();

  document.getElementById("productName").value = "";
  document.getElementById("manualDateText").value = "";
  document.getElementById("manualDatePicker").value = "";
  document.getElementById("ocrMessage").innerText = "";
  ocrDate = "";
}

function renderItems() {
  const items = JSON.parse(localStorage.getItem("freshItems") || "[]");
  const list = document.getElementById("itemList");
  list.innerHTML = "";

  items.forEach(item => {
    const li = document.createElement("li");
    li.innerText = `${item.name} - ${item.date} (${item.category})`;
    list.appendChild(li);
  });
}

renderItems();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("firebase-messaging-sw.js");
}
</script>
